<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style5.css">

    <!-- tomtom -->
    <link rel="stylesheet" href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.15.0/maps/maps.css" type="text/css">

    <script type="text/javascript"
        src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.15.0/maps/maps-web.min.js"></script>

    <script src="index5.js" type="module"></script>
    <title>Server Status</title>
</head>

<body>
    <div class="sidebar">
        <button id="allServers">All Servers</button>
        <button onclick="showPanel('addServer')">Add Server</button>
        <button onclick="showPanel('deleteServer')">Delete Server</button>
        <button onclick="showPanel('editServer')">Edit Server</button>
        <!-- Diğer seçenekler buraya eklenebilir -->
    </div>
    <div class="info-bar">
        <div class="info-box">
            <span id="activeServersCount">9</span>
            <span id="activeServersLabel">Active Servers</span>
        </div>
        <div class="info-box">
            <span id="offlineServersCount">1</span>
            <span id="offlineServersLabel">Offline Servers</span>
        </div>
        <div class="info-box">
            <span id="lastUpdateCount">0 <!-- <br> min ago --></span>
            <span id="lastUpdateLabel">Last Update</span>
        </div>
        <!-- Diğer bilgi kutuları buraya eklenebilir -->
    </div>
    <div id="map"></div>

    <div class="info-list">
        <div id="all-list">
            <h2>All Servers</h2>
            <table id="info-table">
                <tr>
                    <th>Server Name</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>Occupancy Rate</th>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
